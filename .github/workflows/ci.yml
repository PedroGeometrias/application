name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Strict native tests
        run: make -C native clean test
      - name: AddressSanitizer and UBSan
        run: make -C native sanitize

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Unit tests and package
        working-directory: backend
        run: mvn --batch-mode verify

  container:
    runs-on: ubuntu-latest
    needs: [native, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build delivery image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: threatlens:ci
